name = "thevault"
compatibility_date = "2026-05-22"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "dist"

main = "./functions/[[path]].ts"

[observability]
enabled = true

[placement]
mode = "smart"

[[d1_databases]]
binding = "DB"
database_name = "thevault-db"
database_id = "375949ce-7c7d-4822-8235-461446769258"

[vars]
ENVIRONMENT = "production"
VAULT_DOMAIN = "thevaultdfw.win"
API_RUNTIME = "cloudflare-pages"
ENABLE_STRIPE_WEBHOOKS = "true"
ENABLE_RATE_LIMITING = "true"
ENABLE_SECURITY_HEADERS = "true"

# ─── OAuth Secrets (set via `wrangler pages secret put` or Cloudflare dashboard) ───
# APP_SECRET, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
# GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
# X_CLIENT_ID, X_CLIENT_SECRET
# APPLE_CLIENT_ID, APPLE_CLIENT_SECRET

# ─── Web3 Treasury Configuration ───
# SOLANA_TREASURY = "YOUR_SOLANA_TREASURY_ADDRESS"
SOL_USD_RATE = "69.52"
USDC_USD_RATE = "1.00"
